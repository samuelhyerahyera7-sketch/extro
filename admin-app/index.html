<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extro Admin — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; border: 1px solid #e5e7eb; margin: 20px; }
    .brand { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.05em; color: #0f172a; margin: 0 0 2px; }
    .brand span { color: #ff4214; }
    .brand-tag { font-size: 0.75rem; font-weight: 700; color: #9ca3af; margin: 0 0 32px; letter-spacing: 0.08em; text-transform: uppercase; }
    h2 { font-size: 1.1rem; font-weight: 700; margin: 0 0 20px; color: #0f172a; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type=email], input[type=password] { width: 100%; height: 44px; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 0 14px; font-size: 0.9rem; font-family: inherit; outline: none; color: #0f172a; margin-bottom: 14px; }
    input[type=email]:focus, input[type=password]:focus { border-color: #374151; }
    .btn { width: 100%; height: 44px; border: none; border-radius: 100px; background: #0f172a; color: #fff; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 4px; font-family: inherit; }
    .btn:hover { background: #1e293b; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #dc2626; font-size: 0.82rem; margin-top: 8px; min-height: 1.2em; }
  </style>
</head>
<body>
<div class="card">
  <h1 class="brand">Extro<span>.</span></h1>
  <p class="brand-tag">Admin Dashboard</p>

  <h2>Sign in to Admin</h2>
  <label>Email address</label>
  <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email">
  <label>Password</label>
  <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password">
  <p class="error" id="login-error"></p>
  <button class="btn" id="login-btn">Sign in</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script>
  // Auto-redirect if already logged in as admin
  (async () => {
    const profile = await getCurrentProfile();
    if (profile?.role === 'admin') window.location.href = 'home.html';
  })();

  async function doLogin() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    const err = document.getElementById('login-error');
    err.textContent = '';

    if (!email.includes('@')) { err.textContent = 'Please enter a valid email address.'; return; }
    if (!password) { err.textContent = 'Please enter your password.'; return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';

    const { error } = await signInWithPassword(email, password);
    if (error) {
      err.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password.'
        : error.message;
      btn.disabled = false; btn.textContent = 'Sign in';
      return;
    }

    const profile = await getCurrentProfile();
    if (!profile || profile.role !== 'admin') {
      err.textContent = 'Access denied. This account does not have admin privileges.';
      await signOut();
      btn.disabled = false; btn.textContent = 'Sign in';
      return;
    }

    window.location.href = 'home.html';
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password-input').focus();
  });
</script>
</body>
</html>
