<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extro — Order food & groceries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 110px);
      width: 100%;
    }
    .photo-grid img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      display: block;
    }

    .login-body {
      padding: 20px 20px 36px;
    }

    .extro-logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--ink);
      margin: 0 0 22px;
      display: block;
    }
    .extro-logo span { color: var(--primary); }

    .phone-input-row {
      display: flex;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      height: 52px;
      margin-bottom: 10px;
      background: #fff;
    }
    .phone-input-row:focus-within { border-color: #374151; }
    .country-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      border-right: 1.5px solid #d1d5db;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      flex-shrink: 0;
      background: #fff;
    }
    .phone-input-row input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 14px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      background: #fff;
    }
    .email-input {
      width: 100%;
      height: 52px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      outline: none;
      margin-bottom: 10px;
    }
    .email-input:focus { border-color: #374151; }

    .link-underline {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: underline;
      cursor: pointer;
      display: inline-block;
      margin-bottom: 14px;
    }
    .link-primary { color: var(--primary); font-weight: 700; cursor: pointer; }

    .btn-continue {
      width: 100%;
      height: 52px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-continue:active { opacity: 0.88; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: #9ca3af;
      font-size: 0.82rem;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-social {
      width: 100%;
      height: 52px;
      border-radius: 10px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .btn-social:active { background: #f9fafb; }
  </style>
</head>
<body>

  <!-- Photo collage -->
  <div class="photo-grid">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=110&fit=crop&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300&h=110&fit=crop&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300&h=110&fit=crop&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1546964124-0cce460f38ef?w=300&h=110&fit=crop&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1553621042-f6e147245754?w=300&h=110&fit=crop&q=80" alt="">
    <img src="https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=300&h=110&fit=crop&q=80" alt="">
  </div>

  <!-- Login form -->
  <div class="login-body">

    <div id="step-email">
      <span class="extro-logo">Extro<span>.</span></span>

      <!-- Phone (default) -->
      <div id="input-phone-wrap">
        <p style="font-size:1.15rem;font-weight:800;margin:0 0 12px;color:var(--ink)">Enter phone number</p>
        <div class="phone-input-row">
          <div class="country-pill">
            🇿🇦 +27
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <input type="tel" id="phone-number" placeholder="81 234 5678" inputmode="tel" autocomplete="tel">
        </div>
      </div>

      <!-- Email (hidden) -->
      <div id="input-email-wrap" style="display:none">
        <p style="font-size:1.15rem;font-weight:800;margin:0 0 12px;color:var(--ink)">Enter email address</p>
        <input type="email" id="email-address" class="email-input" placeholder="you@example.com" inputmode="email" autocomplete="email">
      </div>

      <span id="toggle-method-link" class="link-underline">Use email instead</span>

      <p class="error-msg" id="email-error" style="margin:0 0 8px"></p>

      <button class="btn-continue" id="send-code-btn">Continue</button>

      <div class="or-divider">or</div>

      <button class="btn-social" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <p style="text-align:center;margin:16px 0 0;font-size:0.82rem;color:var(--muted)">
        Just exploring? <a href="home.html?demo=1" class="link-primary">Try the demo</a>
      </p>

      <p style="text-align:center;margin:14px 0 0;font-size:0.74rem;color:#9ca3af;line-height:1.6">
        By tapping "Continue", you agree to Extro's <u style="cursor:pointer">Terms</u> and <u style="cursor:pointer">Privacy Policy</u>. We may send a verification code. Msg &amp; data rates may apply.
      </p>
    </div>

    <!-- OTP step -->
    <div id="step-otp" style="display:none">
      <button class="auth-back-btn" id="back-to-email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <h2 style="margin:16px 0 4px;font-size:1.3rem;font-weight:800;color:var(--ink)">Enter the code</h2>
      <p id="otp-hint" style="color:var(--muted);font-size:0.88rem;margin:0 0 24px;line-height:1.5"></p>

      <div class="otp-row">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      </div>

      <button class="btn-continue" id="verify-btn" style="margin-top:24px">Verify</button>
      <p class="error-msg" id="otp-error" style="margin-top:8px"></p>
      <p style="text-align:center;font-size:0.85rem;color:var(--muted);margin-top:16px">
        Didn't receive it? <span id="resend-link" class="link-primary">Resend</span>
      </p>
    </div>

  </div>

  <script src="js/demo-mock.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const role = 'customer';
    let emailAddress = '';
    let phoneNumber = '';
    let authMethod = 'phone';

    function setAuthMethod(method) {
      authMethod = method;
      document.getElementById('input-email-wrap').style.display = method === 'email' ? 'block' : 'none';
      document.getElementById('input-phone-wrap').style.display = method === 'phone' ? 'block' : 'none';
      document.getElementById('toggle-method-link').textContent = method === 'phone' ? 'Use email instead' : 'Use phone instead';
    }

    document.getElementById('toggle-method-link').addEventListener('click', () => {
      setAuthMethod(authMethod === 'phone' ? 'email' : 'phone');
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      if (window.DEMO_MODE) { window.location.href = 'home.html?demo=1'; return; }
      const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/customer-app/home' } });
      if (error) document.getElementById('email-error').textContent = error.message;
    });

    async function requestCode() {
      const errorEl = document.getElementById('email-error');
      errorEl.textContent = '';
      const btn = document.getElementById('send-code-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      let error;

      if (authMethod === 'email') {
        const raw = document.getElementById('email-address').value.trim();
        if (!raw || !raw.includes('@')) { errorEl.textContent = 'Please enter a valid email address.'; btn.disabled = false; btn.textContent = 'Continue'; return; }
        emailAddress = raw;
        ({ error } = await sendOtp(emailAddress, role));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${emailAddress}. Check your inbox.`;
      } else {
        const raw = document.getElementById('phone-number').value.trim().replace(/\s/g, '');
        if (!raw || raw.length < 8) { errorEl.textContent = 'Please enter a valid phone number.'; btn.disabled = false; btn.textContent = 'Continue'; return; }
        phoneNumber = raw.startsWith('+') ? raw : '+27' + raw.replace(/^0/, '');
        ({ error } = await sendPhoneOtp(phoneNumber, role));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${phoneNumber}.`;
      }

      btn.disabled = false; btn.textContent = 'Continue';
      if (error) { errorEl.textContent = error.message; return; }
      document.getElementById('step-email').style.display = 'none';
      document.getElementById('step-otp').style.display = 'block';
      document.querySelectorAll('.otp-box')[0].focus();
    }

    document.getElementById('send-code-btn').addEventListener('click', requestCode);
    document.getElementById('phone-number').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });
    document.getElementById('email-address').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });

    document.getElementById('back-to-email').addEventListener('click', () => {
      document.getElementById('step-otp').style.display = 'none';
      document.getElementById('step-email').style.display = 'block';
      document.getElementById('otp-error').textContent = '';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    });

    document.getElementById('resend-link').addEventListener('click', requestCode);

    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < otpBoxes.length - 1) otpBoxes[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i - 1].focus();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        [...text].slice(0, 6 - i).forEach((ch, j) => { if (otpBoxes[i + j]) otpBoxes[i + j].value = ch; });
        otpBoxes[Math.min(i + text.length, otpBoxes.length - 1)].focus();
      });
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const token = [...otpBoxes].map(b => b.value).join('');
      const errorEl = document.getElementById('otp-error');
      errorEl.textContent = '';
      if (token.length < 6) { errorEl.textContent = 'Please enter all 6 digits.'; return; }
      const btn = document.getElementById('verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      const { error } = authMethod === 'email'
        ? await verifyOtp(emailAddress, token)
        : await verifyPhoneOtp(phoneNumber, token);
      btn.disabled = false; btn.textContent = 'Verify';
      if (error) { errorEl.textContent = error.message; return; }
      window.location.href = window.DEMO_MODE ? 'home.html?demo=1' : 'home.html';
    });

    (async () => {
      if (window.DEMO_MODE) { window.location.href = 'home.html?demo=1'; return; }
      const profile = await getCurrentProfile();
      if (profile && profile.role === role) window.location.href = 'home.html';
    })();
  </script>
</body>
</html>
