<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extro — Order food & groceries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; background: #fff; }
    .auth-hero {
      position: relative;
      height: 270px;
      background: linear-gradient(140deg, #ff4214 0%, #ff6535 55%, #ff8c42 100%);
      overflow: hidden;
      flex-shrink: 0;
    }
    .auth-hero-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .auth-hero-emoji {
      position: absolute;
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }
    .auth-hero-logo {
      position: absolute;
      top: 28px;
      left: 24px;
      z-index: 1;
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.04em;
      font-family: 'Inter', sans-serif;
    }
    .auth-hero-curve {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: #fff;
      border-radius: 22px 22px 0 0;
    }
    .auth-form-wrap { padding: 20px 24px 56px; }
    .auth-phone-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .auth-country-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }
    .auth-field {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      padding: 0 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      box-sizing: border-box;
      background: #fff;
      color: var(--ink);
    }
    .auth-field:focus { border-color: var(--primary); }
    .auth-toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div style="min-height:100vh;display:flex;flex-direction:column;background:#fff">

    <!-- Hero -->
    <div class="auth-hero">
      <div class="auth-hero-circle" style="width:220px;height:220px;top:-70px;right:-50px"></div>
      <div class="auth-hero-circle" style="width:140px;height:140px;bottom:-50px;left:-30px"></div>
      <div class="auth-hero-emoji" style="font-size:5.5rem;opacity:0.15;top:-8px;right:-4px;transform:rotate(14deg)">🍔</div>
      <div class="auth-hero-emoji" style="font-size:4.5rem;opacity:0.12;bottom:34px;left:-4px;transform:rotate(-10deg)">🍕</div>
      <div class="auth-hero-emoji" style="font-size:3.8rem;opacity:0.1;top:60px;left:72px;transform:rotate(6deg)">🥗</div>
      <div class="auth-hero-emoji" style="font-size:4rem;opacity:0.09;bottom:40px;right:44px;transform:rotate(-4deg)">🥩</div>
      <div class="auth-hero-logo">Extro<span style="opacity:0.6">.</span></div>
      <div class="auth-hero-curve"></div>
    </div>

    <!-- Form -->
    <div class="auth-form-wrap">

      <div id="step-email">
        <h2 style="font-size:1.55rem;font-weight:800;margin:0 0 4px;color:var(--ink);letter-spacing:-0.02em">Sign in or sign up</h2>
        <p style="color:var(--muted);font-size:0.88rem;margin:0 0 24px;line-height:1.5">Order food & groceries delivered fast to your door.</p>

        <!-- Phone (primary) -->
        <div id="input-phone-wrap">
          <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--ink);margin-bottom:8px">Phone number</label>
          <div class="auth-phone-row">
            <div class="auth-country-pill">🇿🇦 +27</div>
            <input type="tel" id="phone-number" class="auth-field" placeholder="81 234 5678" inputmode="tel" autocomplete="tel" style="flex:1;margin-bottom:0">
          </div>
        </div>

        <!-- Email (secondary) -->
        <div id="input-email-wrap" style="display:none">
          <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--ink);margin-bottom:8px">Email address</label>
          <input type="email" id="email-address" class="auth-field" placeholder="you@example.com" inputmode="email" autocomplete="email" style="margin-bottom:14px">
        </div>

        <button class="btn btn-primary btn-block" id="send-code-btn" style="border-radius:100px;height:52px;font-size:1rem;font-weight:700">Continue</button>
        <p class="error-msg" id="email-error" style="margin-top:10px"></p>

        <p style="text-align:center;margin-top:20px;font-size:0.88rem">
          <span id="toggle-method-link" class="auth-toggle-link">Use email instead</span>
        </p>
        <p style="text-align:center;margin-top:14px;font-size:0.82rem;color:var(--muted)">
          Just exploring? <a href="home.html?demo=1" class="auth-toggle-link">Try the demo</a>
        </p>
      </div>

      <div id="step-otp" style="display:none">
        <button class="auth-back-btn" id="back-to-email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <h2 style="margin:16px 0 4px;font-size:1.3rem;font-weight:800">Enter the code</h2>
        <p id="otp-hint" style="color:var(--muted);font-size:0.88rem;margin:0 0 24px;line-height:1.5"></p>

        <div class="otp-row">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>

        <button class="btn btn-primary btn-block" id="verify-btn" style="margin-top:24px;border-radius:100px;height:50px;font-size:1rem">Verify</button>
        <p class="error-msg" id="otp-error" style="margin-top:8px"></p>
        <p style="text-align:center;font-size:0.85rem;color:var(--muted);margin-top:16px">
          Didn't receive it? <span id="resend-link" class="auth-toggle-link">Resend</span>
        </p>
      </div>

    </div>
  </div>

  <script src="js/demo-mock.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const role = 'customer';
    let emailAddress = '';
    let phoneNumber = '';
    let authMethod = 'phone';

    function setAuthMethod(method) {
      authMethod = method;
      document.getElementById('input-email-wrap').style.display = method === 'email' ? 'block' : 'none';
      document.getElementById('input-phone-wrap').style.display = method === 'phone' ? 'block' : 'none';
      document.getElementById('toggle-method-link').textContent = method === 'phone' ? 'Use email instead' : 'Use phone instead';
    }

    document.getElementById('toggle-method-link').addEventListener('click', () => {
      setAuthMethod(authMethod === 'phone' ? 'email' : 'phone');
    });

    async function requestCode() {
      const errorEl = document.getElementById('email-error');
      errorEl.textContent = '';
      const btn = document.getElementById('send-code-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      let error;

      if (authMethod === 'email') {
        const raw = document.getElementById('email-address').value.trim();
        if (!raw || !raw.includes('@')) { errorEl.textContent = 'Please enter a valid email address.'; btn.disabled = false; btn.textContent = 'Continue'; return; }
        emailAddress = raw;
        ({ error } = await sendOtp(emailAddress, role));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${emailAddress}. Check your inbox.`;
      } else {
        const raw = document.getElementById('phone-number').value.trim().replace(/\s/g, '');
        if (!raw || raw.length < 8) { errorEl.textContent = 'Please enter a valid phone number.'; btn.disabled = false; btn.textContent = 'Continue'; return; }
        phoneNumber = raw.startsWith('+') ? raw : '+27' + raw.replace(/^0/, '');
        ({ error } = await sendPhoneOtp(phoneNumber, role));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${phoneNumber}.`;
      }

      btn.disabled = false; btn.textContent = 'Continue';
      if (error) { errorEl.textContent = error.message; return; }
      document.getElementById('step-email').style.display = 'none';
      document.getElementById('step-otp').style.display = 'block';
      document.querySelectorAll('.otp-box')[0].focus();
    }

    document.getElementById('send-code-btn').addEventListener('click', requestCode);
    document.getElementById('phone-number').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });
    document.getElementById('email-address').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });

    document.getElementById('back-to-email').addEventListener('click', () => {
      document.getElementById('step-otp').style.display = 'none';
      document.getElementById('step-email').style.display = 'block';
      document.getElementById('otp-error').textContent = '';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    });

    document.getElementById('resend-link').addEventListener('click', requestCode);

    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < otpBoxes.length - 1) otpBoxes[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i - 1].focus();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        [...text].slice(0, 6 - i).forEach((ch, j) => { if (otpBoxes[i + j]) otpBoxes[i + j].value = ch; });
        otpBoxes[Math.min(i + text.length, otpBoxes.length - 1)].focus();
      });
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const token = [...otpBoxes].map(b => b.value).join('');
      const errorEl = document.getElementById('otp-error');
      errorEl.textContent = '';
      if (token.length < 6) { errorEl.textContent = 'Please enter all 6 digits.'; return; }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      const { error } = authMethod === 'email'
        ? await verifyOtp(emailAddress, token)
        : await verifyPhoneOtp(phoneNumber, token);
      btn.disabled = false; btn.textContent = 'Verify';
      if (error) { errorEl.textContent = error.message; return; }

      window.location.href = window.DEMO_MODE ? 'home.html?demo=1' : 'home.html';
    });

    (async () => {
      if (window.DEMO_MODE) { window.location.href = 'home.html?demo=1'; return; }
      const profile = await getCurrentProfile();
      if (profile && profile.role === role) window.location.href = 'home.html';
    })();
  </script>
</body>
</html>
