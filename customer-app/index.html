<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extro — Order food & groceries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">

      <div id="step-phone">
        <h1 class="auth-logo">Extro<span style="color:var(--primary)">.</span></h1>
        <p class="auth-tagline">Order food & groceries delivered fast to your door.</p>

        <div class="phone-field">
          <div class="phone-prefix">
            <span class="dial-code">+27</span>
          </div>
          <input type="tel" id="phone-number" placeholder="81 234 5678" inputmode="numeric">
        </div>

        <button class="btn btn-primary btn-block" id="send-sms-btn" style="margin-bottom:10px;border-radius:100px;height:50px">
          Send code by SMS
        </button>
        <button class="btn btn-outline btn-block" id="send-wa-btn" style="border-radius:100px;height:50px">
          <svg style="vertical-align:middle;margin-right:6px;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
          </svg>
          Send code by WhatsApp
        </button>
        <p class="error-msg" id="phone-error" style="margin-top:10px"></p>
        <p style="text-align:center;margin-top:16px;font-size:0.82rem;color:var(--muted)">
          Just exploring? <a href="home.html?demo=1" style="color:var(--primary);font-weight:700">Try the demo</a>
        </p>
      </div>

      <div id="step-otp" style="display:none">
        <button class="auth-back-btn" id="back-to-phone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <h2 style="margin:16px 0 4px;font-size:1.3rem;font-weight:800">Enter the code</h2>
        <p id="otp-hint" style="color:var(--muted);font-size:0.88rem;margin:0 0 24px;line-height:1.5"></p>

        <div class="otp-row">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>

        <button class="btn btn-primary btn-block" id="verify-btn" style="margin-top:24px;border-radius:100px;height:50px;font-size:1rem">Verify</button>
        <p class="error-msg" id="otp-error" style="margin-top:8px"></p>
        <p style="text-align:center;font-size:0.85rem;color:var(--muted);margin-top:16px">
          Didn't receive it? <span id="resend-link" style="color:var(--primary);font-weight:700;cursor:pointer">Resend</span>
        </p>
      </div>

    </div>
  </div>

  <script src="js/demo-mock.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const role = 'customer';
    let phoneE164 = '';
    let otpChannel = 'sms';

    async function requestCode(ch) {
      const raw = document.getElementById('phone-number').value.replace(/\D/g, '');
      const errorEl = document.getElementById('phone-error');
      errorEl.textContent = '';
      if (raw.length < 8) { errorEl.textContent = 'Please enter a valid phone number.'; return; }
      phoneE164 = '+27' + (raw.startsWith('27') ? raw.slice(2) : raw.startsWith('0') ? raw.slice(1) : raw);
      otpChannel = ch;

      const btnId = ch === 'sms' ? 'send-sms-btn' : 'send-wa-btn';
      const btn = document.getElementById(btnId);
      const orig = btn.innerHTML;
      btn.disabled = true; btn.textContent = 'Sending…';

      const { error } = await sendOtp(phoneE164, ch, role);
      btn.disabled = false; btn.innerHTML = orig;

      if (error) { errorEl.textContent = error.message; return; }

      document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${phoneE164}`;
      document.getElementById('step-phone').style.display = 'none';
      document.getElementById('step-otp').style.display = 'block';
      document.querySelectorAll('.otp-box')[0].focus();
    }

    document.getElementById('send-sms-btn').addEventListener('click', () => requestCode('sms'));
    document.getElementById('send-wa-btn').addEventListener('click', () => requestCode('whatsapp'));

    document.getElementById('back-to-phone').addEventListener('click', () => {
      document.getElementById('step-otp').style.display = 'none';
      document.getElementById('step-phone').style.display = 'block';
      document.getElementById('otp-error').textContent = '';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    });

    document.getElementById('resend-link').addEventListener('click', () => requestCode(otpChannel));

    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < otpBoxes.length - 1) otpBoxes[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i - 1].focus();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        [...text].slice(0, 6 - i).forEach((ch, j) => { if (otpBoxes[i + j]) otpBoxes[i + j].value = ch; });
        otpBoxes[Math.min(i + text.length, otpBoxes.length - 1)].focus();
      });
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const token = [...otpBoxes].map(b => b.value).join('');
      const errorEl = document.getElementById('otp-error');
      errorEl.textContent = '';
      if (token.length < 6) { errorEl.textContent = 'Please enter all 6 digits.'; return; }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      const { error } = await verifyOtp(phoneE164, token);
      btn.disabled = false; btn.textContent = 'Verify';
      if (error) { errorEl.textContent = error.message; return; }

      window.location.href = window.DEMO_MODE ? 'home.html?demo=1' : 'home.html';
    });

    (async () => {
      if (window.DEMO_MODE) return;
      const profile = await getCurrentProfile();
      if (profile && profile.role === role) window.location.href = 'home.html';
    })();
  </script>
</body>
</html>
