<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extro — Order food & groceries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    html { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; }
    body { margin: 0; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }

    .bg-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('login-bg.jpg.png') top left / 100% 100% no-repeat;
      z-index: 0;
    }

    .auth-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .content-wrap {
      max-width: 390px;
      margin: 0 auto;
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Hero — logo at 38% from top */
    .logo-block {
      padding-top: 22vh;
      text-align: center;
      flex-shrink: 0;
    }

    .extro-logo {
      font-size: 3.9rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #0f172a;
      margin: 0 0 3px;
      line-height: 1;
    }
    .extro-logo .dot { color: var(--primary); }

    .logo-sub {
      font-size: 0.92rem;
      color: #374151;
      margin: 0;
      font-weight: 500;
    }
    .logo-sub .sep { color: var(--primary); margin: 0 5px; }

    /* Fixed small gap between logo and form */
    .spacer { flex: none; height: 6vh; }

    /* Form section */
    .auth-content {
      padding: 0 64px;
      flex-shrink: 0;
    }

    .footer {
      padding: 4px 64px 6px;
      flex-shrink: 0;
      margin-top: auto;
    }

    .section-label {
      font-size: 0.92rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 5px;
    }

    .phone-input-row {
      display: flex;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      height: 40px;
      margin-bottom: 5px;
      background: #fff;
    }
    .phone-input-row:focus-within { border-color: #374151; }
    .country-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 10px;
      border-right: 1.5px solid #d1d5db;
      font-size: 0.82rem;
      font-weight: 600;
      color: #0f172a;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .phone-input-row input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 10px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      background: #fff;
    }
    .email-input {
      width: 100%;
      height: 40px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 0 10px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      outline: none;
      margin-bottom: 5px;
    }
    .email-input:focus { border-color: #374151; }

    .link-underline {
      font-size: 0.78rem;
      font-weight: 600;
      color: #0f172a;
      text-decoration: underline;
      cursor: pointer;
      display: inline-block;
      margin-bottom: 8px;
    }

    .btn-continue {
      width: 100%;
      height: 40px;
      border-radius: 100px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-continue:active { opacity: 0.88; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      color: #9ca3af;
      font-size: 0.72rem;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-social {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      color: #0f172a;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-social:active { background: #f9fafb; }

    .browse-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-top: 6px;
      cursor: pointer;
      text-decoration: none;
      background: rgba(255, 100, 50, 0.09);
      border-radius: 12px;
    }
    .browse-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .browse-text { flex: 1; }
    .browse-text strong { display: block; font-size: 0.78rem; font-weight: 700; color: #0f172a; line-height: 1.3; }
    .browse-text span { display: block; font-size: 0.68rem; color: #9ca3af; margin-top: 1px; }

    .terms-text {
      text-align: center;
      font-size: 0.66rem;
      color: #9ca3af;
      line-height: 1.55;
      margin-top: 8px;
      padding-left: 12px;
    }
    .terms-text a { color: var(--primary); text-decoration: none; }

    .link-primary { color: var(--primary); font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="auth-page">
    <div class="content-wrap">

      <!-- ── Hero: logo sits at 35vh ── -->
      <div class="logo-block">
        <h1 class="extro-logo">Extro<span class="dot">.</span></h1>
        <p class="logo-sub">Food <span class="sep">•</span> Groceries</p>
      </div>

      <!-- ── Spacer pushes form down ── -->
      <div class="spacer"></div>

      <!-- ── Form section ── -->
      <div class="auth-content">
        <div id="step-email">

          <!-- Phone (default) -->
          <div id="input-phone-wrap">
            <p class="section-label">Enter phone number</p>
            <div class="phone-input-row">
              <div class="country-pill">
                🇿🇦 +27
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
              <input type="tel" id="phone-number" placeholder="81 234 5678" inputmode="tel" autocomplete="tel">
            </div>
          </div>

          <!-- Email (hidden) -->
          <div id="input-email-wrap" style="display:none">
            <p class="section-label">Enter email address</p>
            <input type="email" id="email-address" class="email-input" placeholder="you@example.com" inputmode="email" autocomplete="email">
          </div>

          <span id="toggle-method-link" class="link-underline">Use email instead</span>
          <p class="error-msg" id="email-error" style="margin:0 0 8px"></p>

          <button class="btn-continue" id="send-code-btn">Continue</button>
          <div class="or-divider">or</div>

          <button class="btn-social" id="google-btn">
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
          </button>

          <a href="home.html?demo=1" class="browse-row">
            <div class="browse-text">
              <strong>Browse restaurants without signing in</strong>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
          </a>
        </div>

        <!-- OTP step -->
        <div id="step-otp" style="display:none">
          <button class="auth-back-btn" id="back-to-email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
          </button>
          <h2 style="margin:16px 0 4px;font-size:1.3rem;font-weight:800">Enter the code</h2>
          <p id="otp-hint" style="color:var(--muted);font-size:0.88rem;margin:0 0 24px;line-height:1.5"></p>
          <div class="otp-row">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          </div>
          <button class="btn btn-primary btn-block" id="verify-btn" style="margin-top:24px;border-radius:100px;height:50px;font-size:1rem">Verify</button>
          <p class="error-msg" id="otp-error" style="margin-top:8px"></p>
          <p style="text-align:center;font-size:0.85rem;color:var(--muted);margin-top:16px">
            Didn't receive it? <span id="resend-link" class="link-primary">Resend</span>
          </p>
        </div>
      </div>

      <!-- ── Footer ── -->
      <div class="footer">
        <p class="terms-text">
          By continuing, you agree to Extro's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </p>
      </div>

    </div>
  </div>

  <script src="js/demo-mock.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const role = 'customer';
    let emailAddress = '';
    let phoneNumber = '';
    let authMethod = 'phone';

    function setAuthMethod(method) {
      authMethod = method;
      document.getElementById('input-email-wrap').style.display = method === 'email' ? 'block' : 'none';
      document.getElementById('input-phone-wrap').style.display = method === 'phone' ? 'block' : 'none';
      document.getElementById('toggle-method-link').textContent = method === 'phone' ? 'Use email instead' : 'Use phone instead';
    }

    document.getElementById('toggle-method-link').addEventListener('click', () => {
      setAuthMethod(authMethod === 'phone' ? 'email' : 'phone');
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/home' }
      });
      if (error) {
        const errorEl = document.getElementById('email-error');
        errorEl.textContent = 'Google sign-in is not yet enabled. Please use email or phone.';
      }
    });

    async function requestCode() {
      const errorEl = document.getElementById('email-error');
      errorEl.textContent = '';
      const btn = document.getElementById('send-code-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      let error;

      if (authMethod === 'email') {
        const raw = document.getElementById('email-address').value.trim();
        if (!raw || !raw.includes('@')) { errorEl.textContent = 'Please enter a valid email address.'; btn.disabled = false; btn.textContent = 'Continue'; return; }
        emailAddress = raw;
        ({ error } = await sendOtp(emailAddress, role));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${emailAddress}. Check your inbox.`;
      } else {
        const raw = document.getElementById('phone-number').value.trim().replace(/\s/g, '');
        if (!raw || raw.length < 8) { errorEl.textContent = 'Please enter a valid phone number.'; btn.disabled = false; btn.textContent = 'Continue'; return; }
        phoneNumber = raw.startsWith('+') ? raw : '+27' + raw.replace(/^0/, '');
        ({ error } = await sendPhoneOtp(phoneNumber, role));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${phoneNumber}.`;
      }

      btn.disabled = false; btn.textContent = 'Continue';
      if (error) {
        const raw = error.message || '';
        if (!raw || raw === '{}' || raw === '[object Object]' || raw.toLowerCase().includes('rate limit') || raw.toLowerCase().includes('email rate')) {
          errorEl.textContent = 'Could not send a code right now. Please wait a minute and try again, or sign in with Google.';
        } else if (raw.toLowerCase().includes('unverified') || raw.toLowerCase().includes('twilio')) {
          errorEl.textContent = 'SMS could not be delivered to this number. Please use email or Google to sign in instead.';
        } else {
          errorEl.textContent = raw;
        }
        return;
      }
      document.getElementById('step-email').style.display = 'none';
      document.getElementById('step-otp').style.display = 'block';
      document.querySelectorAll('.otp-box')[0].focus();
    }

    document.getElementById('send-code-btn').addEventListener('click', requestCode);
    document.getElementById('phone-number').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });
    document.getElementById('email-address').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });

    document.getElementById('back-to-email').addEventListener('click', () => {
      document.getElementById('step-otp').style.display = 'none';
      document.getElementById('step-email').style.display = 'block';
      document.getElementById('otp-error').textContent = '';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    });

    document.getElementById('resend-link').addEventListener('click', requestCode);

    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < otpBoxes.length - 1) otpBoxes[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i - 1].focus();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        [...text].slice(0, 6 - i).forEach((ch, j) => { if (otpBoxes[i + j]) otpBoxes[i + j].value = ch; });
        otpBoxes[Math.min(i + text.length, otpBoxes.length - 1)].focus();
      });
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const token = [...otpBoxes].map(b => b.value).join('');
      const errorEl = document.getElementById('otp-error');
      errorEl.textContent = '';
      if (token.length < 6) { errorEl.textContent = 'Please enter all 6 digits.'; return; }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      const { error } = authMethod === 'email'
        ? await verifyOtp(emailAddress, token)
        : await verifyPhoneOtp(phoneNumber, token);
      btn.disabled = false; btn.textContent = 'Verify';
      if (error) { errorEl.textContent = error.message; return; }

      window.location.href = window.DEMO_MODE ? 'home.html?demo=1' : 'home.html';
    });

    (async () => {
      if (window.DEMO_MODE) { window.location.href = 'home.html?demo=1'; return; }
      const profile = await getCurrentProfile();
      if (!(profile && profile.role === role)) return;

      const name = profile.first_name || profile.full_name || 'back';

      // ── Styles ──────────────────────────────────────────────────────
      const st = document.createElement('style');
      st.textContent = `
        #wb-sheet {
          position: fixed;
          bottom: 0; left: 0; right: 0;
          z-index: 100;
          background: #fff;
          border-radius: 20px 20px 0 0;
          box-shadow: 0 -4px 32px rgba(0,0,0,0.13);
          will-change: transform;
          -webkit-user-select: none;
          user-select: none;
          -webkit-tap-highlight-color: transparent;
        }
        #wb-handle-row {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 10px 20px 8px;
          cursor: pointer;
        }
        #wb-handle-pill {
          width: 40px; height: 4px;
          border-radius: 2px;
          background: #d1d5db;
          margin-bottom: 8px;
          flex-shrink: 0;
        }
        #wb-tab-label {
          font-size: 0.78rem;
          font-weight: 700;
          color: #6b7280;
          display: flex;
          align-items: center;
          gap: 4px;
          opacity: 0;
          transition: opacity 0.15s;
          pointer-events: none;
        }
        #wb-body {
          padding: 2px 20px 36px;
        }
        #wb-body-label {
          margin: 0 0 14px;
          font-size: 0.88rem;
          color: #6b7280;
          text-align: center;
          font-family: Inter, sans-serif;
        }
        #wb-continue {
          display: block;
          width: 100%; height: 52px;
          border-radius: 14px; border: none;
          background: var(--primary, #ff4214);
          color: #fff;
          font-size: 1rem; font-weight: 700;
          cursor: pointer;
          font-family: Inter, sans-serif;
          margin-bottom: 10px;
        }
        #wb-signout {
          display: block;
          width: 100%; height: 44px;
          border-radius: 14px;
          border: 1.5px solid #e5e7eb;
          background: #fff;
          color: #374151;
          font-size: 0.9rem; font-weight: 600;
          cursor: pointer;
          font-family: Inter, sans-serif;
        }
      `;
      document.head.appendChild(st);

      // ── DOM ─────────────────────────────────────────────────────────
      const sheet = document.createElement('div');
      sheet.id = 'wb-sheet';
      sheet.innerHTML = `
        <div id="wb-handle-row">
          <div id="wb-handle-pill"></div>
          <div id="wb-tab-label">
            <svg id="wb-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="18 15 12 9 6 15"/>
            </svg>
            Signed in
          </div>
        </div>
        <div id="wb-body">
          <p id="wb-body-label">You're already signed in</p>
          <button id="wb-continue">Continue as ${name}</button>
          <button id="wb-signout">Sign out</button>
        </div>
      `;
      document.body.appendChild(sheet);

      // ── Helpers ─────────────────────────────────────────────────────
      const getHandle = () => document.getElementById('wb-handle-row');
      const getTab    = () => document.getElementById('wb-tab-label');
      const getArrow  = () => document.getElementById('wb-arrow').querySelector('polyline');

      let expanded = false;
      let curY = 0;

      function sheetH()  { return sheet.offsetHeight; }
      function handleH() { return getHandle().offsetHeight; }
      function collY()   { return sheetH() - handleH(); }

      function setY(y, animate) {
        sheet.style.transition = animate
          ? 'transform 0.38s cubic-bezier(0.32,0.72,0,1)'
          : 'none';
        sheet.style.transform = `translateY(${y}px)`;
        curY = y;
      }

      function syncLabel() {
        const fraction = Math.min(1, curY / (collY() || 1));
        getTab().style.opacity = fraction.toFixed(2);
        getArrow().setAttribute('points',
          expanded ? '6 9 12 15 18 9' : '18 15 12 9 6 15');
      }

      function expand() {
        expanded = true;
        setY(0, true);
        syncLabel();
      }

      function collapse() {
        expanded = false;
        setY(collY(), true);
        syncLabel();
      }

      function slideOut(cb) {
        setY(sheetH(), true);
        setTimeout(cb, 400);
      }

      // ── Initial slide-up ─────────────────────────────────────────────
      requestAnimationFrame(() => {
        setY(sheetH(), false);          // off-screen, no animation
        void sheet.offsetHeight;        // force reflow so browser commits the position
        setTimeout(() => collapse(), 60); // animate up to collapsed tab
      });

      // ── Drag ────────────────────────────────────────────────────────
      let dragging = false, moved = false;
      let startCY = 0, startY = 0, lastCY = 0, lastT = 0, vel = 0;

      function cy(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

      function onStart(e) {
        if (e.target.closest('#wb-continue,#wb-signout')) return;
        dragging = true; moved = false;
        startCY = cy(e); startY = curY;
        lastCY = startCY; lastT = Date.now(); vel = 0;
        sheet.style.transition = 'none';
      }

      function onMove(e) {
        if (!dragging) return;
        e.preventDefault();
        const y = cy(e), now = Date.now(), dt = now - lastT;
        if (dt > 0) vel = (y - lastCY) / dt;
        lastCY = y; lastT = now;
        const dy = y - startCY;
        if (Math.abs(dy) > 4) moved = true;
        const newY = Math.max(0, Math.min(sheetH(), startY + dy));
        sheet.style.transform = `translateY(${newY}px)`;
        curY = newY;
        getTab().style.opacity = String(Math.min(1, curY / (collY() || 1)));
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        if (!moved) { expanded ? collapse() : expand(); return; }
        (vel > 0.3 || curY > collY() * 0.45) ? collapse() : expand();
      }

      sheet.addEventListener('touchstart', onStart, { passive: true });
      window.addEventListener('touchmove',  onMove,  { passive: false });
      window.addEventListener('touchend',   onEnd);
      sheet.addEventListener('mousedown',   e => { onStart(e); e.preventDefault(); });
      window.addEventListener('mousemove',  onMove);
      window.addEventListener('mouseup',    onEnd);

      // ── Buttons ──────────────────────────────────────────────────────
      document.getElementById('wb-continue').addEventListener('click', () => {
        slideOut(() => { window.location.href = 'home.html'; });
      });
      document.getElementById('wb-signout').addEventListener('click', async () => {
        await signOut();
        slideOut(() => sheet.remove());
      });
    })();
  </script>
</body>
</html>
