<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extro — Restaurant Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 110px);
      width: 100%;
    }
    .photo-grid img { width: 100%; height: 110px; object-fit: cover; display: block; }

    .login-body { padding: 20px 20px 36px; }

    .extro-logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--ink);
      margin: 0 0 20px;
      display: block;
    }
    .extro-logo span { color: var(--primary); }

    .auth-tabs {
      display: flex;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 9px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .auth-tab.active {
      background: #fff;
      color: #0f172a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    .phone-input-row {
      display: flex;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      height: 52px;
      margin-bottom: 10px;
      background: #fff;
    }
    .phone-input-row:focus-within { border-color: #374151; }
    .country-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      border-right: 1.5px solid #d1d5db;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      flex-shrink: 0;
      background: #fff;
    }
    .phone-input-row input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 14px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      background: #fff;
    }
    .email-input {
      width: 100%;
      height: 52px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      outline: none;
      margin-bottom: 10px;
    }
    .email-input:focus { border-color: #374151; }

    .link-underline {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: underline;
      cursor: pointer;
      display: inline-block;
      margin-bottom: 14px;
    }
    .link-primary { color: var(--primary); font-weight: 700; cursor: pointer; }

    .btn-continue {
      width: 100%;
      height: 52px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-continue:active { opacity: 0.88; }
    .auth-toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>


  <div class="login-body">

    <div id="step-email">
      <span class="extro-logo">Extro<span>.</span></span>

      <!-- Register / Login tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-register">Register</button>
        <button class="auth-tab" id="tab-login">Login</button>
      </div>

      <div id="input-phone-wrap">
        <p id="form-heading" style="font-size:1.05rem;font-weight:700;margin:0 0 12px;color:var(--ink)">Enter your phone number</p>
        <div class="phone-input-row">
          <div class="country-pill">
            🇿🇦 +27
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <input type="tel" id="phone-number" placeholder="81 234 5678" inputmode="tel" autocomplete="tel">
        </div>
      </div>

      <div id="input-email-wrap" style="display:none">
        <p style="font-size:1.05rem;font-weight:700;margin:0 0 12px;color:var(--ink)">Enter your email address</p>
        <input type="email" id="email-address" class="email-input" placeholder="you@example.com" inputmode="email" autocomplete="email">
      </div>

      <span id="toggle-method-link" class="link-underline">Use email instead</span>

      <p class="error-msg" id="email-error" style="margin:0 0 8px"></p>

      <button class="btn-continue" id="send-code-btn">Continue</button>

      <p style="text-align:center;margin:16px 0 0;font-size:0.82rem;color:var(--muted)">
        Just exploring? <a href="home.html?demo=1" class="link-primary">Try the demo</a>
      </p>
    </div>

    <div id="step-otp" style="display:none">
      <button class="auth-back-btn" id="back-to-email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <h2 style="margin:16px 0 4px;font-size:1.3rem;font-weight:800">Enter the code</h2>
      <p id="otp-hint" style="color:var(--muted);font-size:0.88rem;margin:0 0 24px;line-height:1.5"></p>

      <div class="otp-row">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      </div>

      <button class="btn btn-primary btn-block" id="verify-btn" style="margin-top:24px;border-radius:100px;height:50px;font-size:1rem">Verify</button>
      <p class="error-msg" id="otp-error" style="margin-top:8px"></p>
      <p style="text-align:center;font-size:0.85rem;color:var(--muted);margin-top:16px">
        Didn't receive it? <span id="resend-link" class="auth-toggle-link">Resend</span>
      </p>
    </div>

  </div>

  <script src="js/demo-mock.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const role = 'restaurant';
    let emailAddress = '';
    let phoneNumber = '';
    let authMethod = 'phone';
    let authMode = 'register'; // 'register' | 'login'

    // Tab switching
    document.getElementById('tab-register').addEventListener('click', () => setMode('register'));
    document.getElementById('tab-login').addEventListener('click', () => setMode('login'));

    function setMode(mode) {
      authMode = mode;
      document.getElementById('tab-register').classList.toggle('active', mode === 'register');
      document.getElementById('tab-login').classList.toggle('active', mode === 'login');
      document.getElementById('send-code-btn').textContent = mode === 'register' ? 'Continue' : 'Send code';
      document.getElementById('email-error').textContent = '';
    }

    function setAuthMethod(method) {
      authMethod = method;
      document.getElementById('input-email-wrap').style.display = method === 'email' ? 'block' : 'none';
      document.getElementById('input-phone-wrap').style.display = method === 'phone' ? 'block' : 'none';
      document.getElementById('toggle-method-link').textContent = method === 'phone' ? 'Use email instead' : 'Use phone instead';
    }

    document.getElementById('toggle-method-link').addEventListener('click', () => {
      setAuthMethod(authMethod === 'phone' ? 'email' : 'phone');
    });

    async function requestCode() {
      const errorEl = document.getElementById('email-error');
      errorEl.textContent = '';
      const btn = document.getElementById('send-code-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      const createUser = authMode === 'register';
      let error;

      if (authMethod === 'email') {
        const raw = document.getElementById('email-address').value.trim();
        if (!raw || !raw.includes('@')) { errorEl.textContent = 'Please enter a valid email address.'; btn.disabled = false; btn.textContent = authMode === 'register' ? 'Continue' : 'Send code'; return; }
        emailAddress = raw;
        ({ error } = await sendOtp(emailAddress, role, createUser));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${emailAddress}. Check your inbox.`;
      } else {
        const raw = document.getElementById('phone-number').value.trim().replace(/\s/g, '');
        if (!raw || raw.length < 8) { errorEl.textContent = 'Please enter a valid phone number.'; btn.disabled = false; btn.textContent = authMode === 'register' ? 'Continue' : 'Send code'; return; }
        phoneNumber = raw.startsWith('+') ? raw : '+27' + raw.replace(/^0/, '');
        ({ error } = await sendPhoneOtp(phoneNumber, role, createUser));
        if (!error) document.getElementById('otp-hint').textContent = `We sent a 6-digit code to ${phoneNumber}.`;
      }

      btn.disabled = false; btn.textContent = authMode === 'register' ? 'Continue' : 'Send code';
      if (error) {
        errorEl.textContent = error.message === 'Signups not allowed for otp'
          ? 'No account found. Please register first.'
          : error.message;
        return;
      }
      document.getElementById('step-email').style.display = 'none';
      document.getElementById('step-otp').style.display = 'block';
      document.querySelectorAll('.otp-box')[0].focus();
    }

    document.getElementById('send-code-btn').addEventListener('click', requestCode);
    document.getElementById('phone-number').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });
    document.getElementById('email-address').addEventListener('keydown', e => { if (e.key === 'Enter') requestCode(); });

    document.getElementById('back-to-email').addEventListener('click', () => {
      document.getElementById('step-otp').style.display = 'none';
      document.getElementById('step-email').style.display = 'block';
      document.getElementById('otp-error').textContent = '';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    });

    document.getElementById('resend-link').addEventListener('click', requestCode);

    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < otpBoxes.length - 1) otpBoxes[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i - 1].focus();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        [...text].slice(0, 6 - i).forEach((ch, j) => { if (otpBoxes[i + j]) otpBoxes[i + j].value = ch; });
        otpBoxes[Math.min(i + text.length, otpBoxes.length - 1)].focus();
      });
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const token = [...otpBoxes].map(b => b.value).join('');
      const errorEl = document.getElementById('otp-error');
      errorEl.textContent = '';
      if (token.length < 6) { errorEl.textContent = 'Please enter all 6 digits.'; return; }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      const { error } = authMethod === 'email'
        ? await verifyOtp(emailAddress, token)
        : await verifyPhoneOtp(phoneNumber, token);
      btn.disabled = false; btn.textContent = 'Verify';
      if (error) { errorEl.textContent = error.message; return; }

      window.location.href = window.DEMO_MODE ? 'home.html?demo=1' : 'home.html';
    });

    (async () => {
      if (window.DEMO_MODE) { window.location.href = 'home.html?demo=1'; return; }
      const profile = await getCurrentProfile();
      if (profile && profile.role === role) window.location.href = 'home.html';
    })();
  </script>
</body>
</html>
